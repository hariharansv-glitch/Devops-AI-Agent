# =============================================================================
# AI DevOps Assistant - Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in your LLM key + VM credentials.
#   2. docker compose up --build
#   3. Open http://localhost:5500/ for the web UI (or /docs for OpenAPI).
#
# If you use an SSH private key for the VM, drop it into ./keys/ (mounted
# read-only below) and point VM_PRIVATE_KEY at the in-container path, e.g.
# VM_PRIVATE_KEY=/keys/id_key. The Jenkins pipeline does this automatically.
# =============================================================================

# Stable project name so containers/networks get predictable names and the
# CI pipeline can address them reliably.
name: devops-ai-agent

services:
  devops-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-devops-assistant:latest
    container_name: devops-ai-agent
    restart: unless-stopped
    env_file:
      - .env
    # HOST NETWORKING (Linux only): the agent inspects the very VM it runs on,
    # so it needs to reach the host's SSH daemon. On a default bridge network
    # the container can't hairpin back to the host's *public* IP on cloud
    # VMs (OCI, AWS, etc.), and even 172.17.0.1 isn't always routable to sshd.
    # `network_mode: host` gives the container the host's network stack —
    # 127.0.0.1 inside == the host — so SSH, docker over SSH, etc. all work.
    # The app binds to 0.0.0.0:5500 directly on the host (no port publish),
    # so `ports:` is intentionally omitted (host mode ignores it anyway).
    network_mode: host
    # Ensure the app binds to 5500 regardless of what API_PORT says in .env.
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "5500"
    volumes:
      # Logs live in a NAMED VOLUME (not a bind mount) so the volume driver
      # inherits the image's `app:app` ownership. A bind mount to ./logs would
      # be created as root on the host, which the non-root container user
      # (uid 1000) cannot write to. To tail logs from the host, use
      # `docker compose logs -f` or `docker exec devops-ai-agent tail -f
      # /app/logs/devops_agent.log`.
      - devops_logs:/app/logs
      # SSH private key(s) for the target VM live in a NAMED VOLUME. Using a
      # bind mount to ./keys would tie the container's lifetime to the CI
      # workspace: `post { always } { rm -rf keys }` would evict the key from
      # the running container. The Jenkinsfile populates this volume via a
      # short-lived helper container. Set VM_PRIVATE_KEY=/keys/target_vm_key
      # in .env to use it.
      - devops_keys:/keys:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5500/healthz', timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  devops_logs:
  devops_keys:
